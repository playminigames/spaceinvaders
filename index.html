<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Space Invaders</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            margin: 0;
            padding: 0;
        }
        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #050508;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        canvas {
            display: block;
            max-width: 100%;
            max-height: 100%;
            background: #020205;
        }
        /* Glassmorphic Modern UI Overlays */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(5, 5, 10, 0.65);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            color: #fff;
            z-index: 10;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .hidden {
            display: none !important;
            opacity: 0;
            pointer-events: none;
        }
        h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: 4px;
            background: linear-gradient(135deg, #00f3ff 0%, #ff007f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
            text-align: center;
        }
        p {
            font-size: 1rem;
            margin-bottom: 35px;
            color: #8f92a3;
            text-align: center;
            max-width: 80%;
            line-height: 1.5;
            letter-spacing: 0.5px;
        }
        button {
            padding: 16px 45px;
            font-size: 1.1rem;
            font-weight: 600;
            background: rgba(255, 255, 255, 0.03);
            color: #00f3ff;
            border: 1px solid rgba(0, 243, 255, 0.3);
            cursor: pointer;
            letter-spacing: 2px;
            text-transform: uppercase;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 30px rgba(0, 243, 255, 0.05);
        }
        button:hover, button:active {
            background: #00f3ff;
            color: #020205;
            border-color: #00f3ff;
            box-shadow: 0 0 30px rgba(0, 243, 255, 0.4);
            transform: scale(1.03);
        }
        #mobile-hint {
            position: absolute;
            bottom: 30px;
            color: rgba(255, 255, 255, 0.25);
            font-size: 0.85rem;
            font-weight: 500;
            letter-spacing: 1.5px;
            pointer-events: none;
            text-align: center;
            width: 100%;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="gameCanvas"></canvas>
        <div id="mobile-hint">Drag anywhere to move • Continuous Auto-Fire Active</div>

        <div id="menu-overlay" class="overlay">
            <h1>NEON STRIKE</h1>
            <p>Automatic combat systems online. Drag anywhere to guide the ship.</p>
            <button id="start-btn">Launch Operation</button>
        </div>

        <div id="gameover-overlay" class="overlay hidden">
            <h1>SYSTEM FAILURE</h1>
            <p id="final-score">Score: 0</p>
            <button id="restart-btn">Reboot Session</button>
        </div>
    </div>

    <script>
        // --- SYNTH AUDIO FX ENGINE ---
        const AudioFX = {
            ctx: null,
            init() {
                this.ctx = new (window.AudioContext || window.webkitAudioContext)();
            },
            play(type) {
                if (!this.ctx) return;
                if (this.ctx.state === 'suspended') this.ctx.resume();
                
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                const now = this.ctx.currentTime;

                if (type === 'laser') {
                    osc.type = 'triangle';
                    osc.frequency.setValueAtTime(520, now);
                    osc.frequency.exponentialRampToValueAtTime(120, now + 0.12);
                    gain.gain.setValueAtTime(0.15, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.12);
                    osc.start(now);
                    osc.stop(now + 0.12);
                } else if (type === 'explosion') {
                    osc.type = 'sawtooth';
                    osc.frequency.setValueAtTime(110, now);
                    osc.frequency.linearRampToValueAtTime(20, now + 0.35);
                    gain.gain.setValueAtTime(0.35, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.35);
                    osc.start(now);
                    osc.stop(now + 0.35);
                } else if (type === 'alien_laser') {
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(180, now);
                    osc.frequency.linearRampToValueAtTime(450, now + 0.22);
                    gain.gain.setValueAtTime(0.06, now);
                    gain.gain.linearRampToValueAtTime(0.001, now + 0.22);
                    osc.start(now);
                    osc.stop(now + 0.22);
                }
            }
        };

        // --- GLOBAL SETUP CONFIG ---
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const V_WIDTH = 900;
        const V_HEIGHT = 650;

        let state = {
            running: false,
            score: 0,
            lives: 3,
            wave: 1,
            player: null,
            bullets: [],
            alienBullets: [],
            aliens: [],
            particles: [],
            bunkers: [],
            stars: [],
            alienDirection: 1,
            alienSpeedModifier: 1,
            lastTime: 0,
            // Fluid touch states
            touchId: null,
            touchX: null
        };

        const keys = {};

        function generateStarfield() {
            state.stars = [];
            for(let i = 0; i < 45; i++) {
                state.stars.push({
                    x: Math.random() * V_WIDTH,
                    y: Math.random() * V_HEIGHT,
                    size: Math.random() * 1.5 + 0.5,
                    speed: Math.random() * 15 + 5
                });
            }
        }

        // --- ENTITY CONFIGURATIONS ---
        class Player {
            constructor() {
                this.width = 46;
                this.height = 32;
                this.x = V_WIDTH / 2 - this.width / 2;
                this.y = V_HEIGHT - 80;
                this.speed = 480; 
                this.lastShot = 0;
                this.shootCooldown = 220; // Sleek automatic fire rate
            }

            update(dt) {
                if (keys['Left']) this.x -= this.speed * dt;
                if (keys['Right']) this.x += this.speed * dt;

                if (this.x < 20) this.x = 20;
                if (this.x > V_WIDTH - this.width - 20) this.x = V_WIDTH - this.width - 20;
            }

            shoot() {
                const now = Date.now();
                if (now - this.lastShot > this.shootCooldown) {
                    state.bullets.push({
                        x: this.x + this.width / 2,
                        y: this.y - 4,
                        length: 16,
                        speed: 750
                    });
                    AudioFX.play('laser');
                    this.lastShot = now;
                }
            }

            draw() {
                ctx.save();
                ctx.shadowBlur = 15;
                ctx.shadowColor = '#00f3ff';
                ctx.strokeStyle = '#00f3ff';
                ctx.fillStyle = 'rgba(0, 243, 255, 0.12)';
                ctx.lineWidth = 2.5;

                ctx.beginPath();
                ctx.moveTo(this.x + this.width / 2, this.y);
                ctx.lineTo(this.x + this.width, this.y + this.height);
                ctx.lineTo(this.x + this.width * 0.75, this.y + this.height * 0.75);
                ctx.lineTo(this.x + this.width * 0.25, this.y + this.height * 0.75);
                ctx.lineTo(this.x, this.y + this.height);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }
        }

        class Bunker {
            constructor(x, y) {
                this.x = x;
                this.y = y;
                this.width = 70;
                this.height = 35;
                this.resolution = 5;
                this.grid = [];
                
                for (let r = 0; r < this.height; r += this.resolution) {
                    let rowArr = [];
                    for (let c = 0; c < this.width; c += this.resolution) {
                        if (r > this.height * 0.5 && c > this.width * 0.25 && c < this.width * 0.75) {
                            rowArr.push(0);
                        } else {
                            rowArr.push(3);
                        }
                    }
                    this.grid.push(rowArr);
                }
            }

            checkCollision(bx, by) {
                if (bx < this.x || bx > this.x + this.width || by < this.y || by > this.y + this.height) {
                    return false;
                }
                const gC = Math.floor((bx - this.x) / this.resolution);
                const gR = Math.floor((by - this.y) / this.resolution);

                if (this.grid[gR] && this.grid[gR][gC] > 0) {
                    this.grid[gR][gC]--; 
                    return true;
                }
                return false;
            }

            draw() {
                ctx.save();
                for (let r = 0; r < this.grid.length; r++) {
                    for (let c = 0; c < this.grid[r].length; c++) {
                        const hp = this.grid[r][c];
                        if (hp > 0) {
                            ctx.fillStyle = hp === 3 ? 'rgba(0, 243, 255, 0.75)' : hp === 2 ? 'rgba(0, 180, 255, 0.45)' : 'rgba(0, 100, 255, 0.2)';
                            ctx.fillRect(this.x + c * this.resolution, this.y + r * this.resolution, this.resolution - 0.5, this.resolution - 0.5);
                        }
                    }
                }
                ctx.restore();
            }
        }

        // --- CORE ENGINE PIPELINES ---

        function resizeCanvas() {
            const container = document.getElementById('game-container');
            let w = container.clientWidth;
            let h = container.clientWidth * (V_HEIGHT / V_WIDTH);

            if (h > container.clientHeight) {
                h = container.clientHeight;
                w = container.clientHeight * (V_WIDTH / V_HEIGHT);
            }

            canvas.style.width = `${w}px`;
            canvas.style.height = `${h}px`;
            canvas.width = V_WIDTH;
            canvas.height = V_HEIGHT;
        }

        function spawnAliens() {
            state.aliens = [];
            const rows = 4;
            const cols = 9;
            for (let r = 0; r < rows; r++) {
                for (let c = 0; c < cols; c++) {
                    state.aliens.push({
                        x: 100 + c * 75,
                        y: 90 + r * 50,
                        width: 36,
                        height: 26,
                        type: r % 2 === 0 ? 'diamond' : 'hex',
                        points: (4 - r) * 15
                    });
                }
            }
            state.alienDirection = 1;
            state.alienSpeedModifier = 35 + (state.wave * 15);
        }

        function drawAlien(a) {
            ctx.save();
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#ff007f';
            ctx.strokeStyle = '#ff007f';
            ctx.fillStyle = 'rgba(255, 0, 127, 0.1)';
            ctx.lineWidth = 2;

            ctx.beginPath();
            if (a.type === 'diamond') {
                ctx.moveTo(a.x + a.width / 2, a.y);
                ctx.lineTo(a.x + a.width, a.y + a.height / 2);
                ctx.lineTo(a.x + a.width / 2, a.y + a.height);
                ctx.lineTo(a.x, a.y + a.height / 2);
            } else {
                ctx.moveTo(a.x + a.width * 0.25, a.y);
                ctx.lineTo(a.x + a.width * 0.75, a.y);
                ctx.lineTo(a.x + a.width, a.y + a.height / 2);
                ctx.lineTo(a.x + a.width * 0.75, a.y + a.height);
                ctx.lineTo(a.x + a.width * 0.25, a.y + a.height);
                ctx.lineTo(a.x, a.y + a.height / 2);
            }
            ctx.closePath();
            ctx.fill();
            ctx.stroke();
            ctx.restore();
        }

        function spawnExplosion(x, y, color) {
            for (let i = 0; i < 16; i++) {
                state.particles.push({
                    x: x,
                    y: y,
                    vx: (Math.random() - 0.5) * 250,
                    vy: (Math.random() - 0.5) * 250,
                    radius: Math.random() * 2 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        function initGame() {
            state.score = 0;
            state.lives = 3;
            state.wave = 1;
            state.bullets = [];
            state.alienBullets = [];
            state.particles = [];
            state.player = new Player();
            generateStarfield();
            spawnAliens();
            
            state.bunkers = [];
            const spacing = V_WIDTH / 4;
            for (let i = 0; i < 3; i++) {
                state.bunkers.push(new Bunker((spacing * (i + 1)) - 35, V_HEIGHT - 155));
            }
        }

        function update(time) {
            if (!state.running) return;

            const dt = Math.min((time - state.lastTime) / 1000, 0.1);
            state.lastTime = time;

            for(let star of state.stars) {
                star.y += star.speed * dt;
                if(star.y > V_HEIGHT) {
                    star.y = 0;
                    star.x = Math.random() * V_WIDTH;
                }
            }

            state.player.update(dt);
            state.player.shoot(); // Run weapon systems automatically

            // 1. Weapon Updates
            for (let i = state.bullets.length - 1; i >= 0; i--) {
                let b = state.bullets[i];
                b.y -= b.speed * dt;

                if (b.y < 0) {
                    state.bullets.splice(i, 1);
                    continue;
                }

                let bulletRemoved = false;
                for (let bunker of state.bunkers) {
                    if (bunker.checkCollision(b.x, b.y)) {
                        state.bullets.splice(i, 1);
                        bulletRemoved = true;
                        break;
                    }
                }
                if (bulletRemoved) continue;

                for (let j = state.aliens.length - 1; j >= 0; j--) {
                    let a = state.aliens[j];
                    if (b.x > a.x && b.x < a.x + a.width && b.y > a.y && b.y < a.y + a.height) {
                        spawnExplosion(a.x + a.width / 2, a.y + a.height / 2, '#ff007f');
                        AudioFX.play('explosion');
                        state.score += a.points;
                        state.aliens.splice(j, 1);
                        state.bullets.splice(i, 1);
                        state.alienSpeedModifier += 4; 
                        bulletRemoved = true;
                        break;
                    }
                }
            }

            // 2. Alien Swarm Logic
            let switchBound = false;
            const swarmStep = state.alienSpeedModifier * state.alienDirection * dt;
            
            for (let a of state.aliens) {
                a.x += swarmStep;
                if (a.x <= 25 || a.x + a.width >= V_WIDTH - 25) {
                    switchBound = true;
                }
            }

            if (switchBound) {
                state.alienDirection *= -1;
                for (let a of state.aliens) {
                    a.y += 24;
                    if (a.y + a.height >= state.player.y) {
                        gameOver();
                    }
                }
            }

            if (state.aliens.length === 0) {
                state.wave++;
                spawnAliens();
            }

            // 3. Counter-Measures
            const firingFormula = 0.007 + (state.wave * 0.003);
            if (state.aliens.length > 0 && Math.random() < firingFormula * (60 * dt)) {
                const shooter = state.aliens[Math.floor(Math.random() * state.aliens.length)];
                state.alienBullets.push({
                    x: shooter.x + shooter.width / 2,
                    y: shooter.y + shooter.height,
                    length: 12,
                    speed: 280 + (state.wave * 20)
                });
                AudioFX.play('alien_laser');
            }

            // 4. Enemy Weapons Matrix
            for (let i = state.alienBullets.length - 1; i >= 0; i--) {
                let ab = state.alienBullets[i];
                ab.y += ab.speed * dt;

                if (ab.y > V_HEIGHT) {
                    state.alienBullets.splice(i, 1);
                    continue;
                }

                let abRemoved = false;
                for (let bunker of state.bunkers) {
                    if (bunker.checkCollision(ab.x, ab.y)) {
                        state.alienBullets.splice(i, 1);
                        abRemoved = true;
                        break;
                    }
                }
                if (abRemoved) continue;

                let p = state.player;
                if (ab.x > p.x && ab.x < p.x + p.width && ab.y > p.y && ab.y < p.y + p.height) {
                    spawnExplosion(p.x + p.width / 2, p.y + p.height / 2, '#00f3ff');
                    AudioFX.play('explosion');
                    state.alienBullets.splice(i, 1);
                    state.lives--;

                    if (state.lives <= 0) {
                        gameOver();
                    }
                    break;
                }
            }

            // 5. Particles
            for (let i = state.particles.length - 1; i >= 0; i--) {
                let p = state.particles[i];
                p.x += p.vx * dt;
                p.y += p.vy * dt;
                p.alpha -= dt * 2.2;
                if (p.alpha <= 0) {
                    state.particles.splice(i, 1);
                }
            }

            render();
            requestAnimationFrame(update);
        }

        // --- RENDER MATRIX PIPELINE ---
        function render() {
            ctx.clearRect(0, 0, V_WIDTH, V_HEIGHT);

            ctx.fillStyle = 'rgba(255, 255, 255, 0.35)';
            for(let star of state.stars) {
                ctx.fillRect(star.x, star.y, star.size, star.size);
            }

            for (let bunker of state.bunkers) bunker.draw();
            for (let a of state.aliens) drawAlien(a);
            if (state.lives > 0) state.player.draw();

            // Lasers
            ctx.save();
            ctx.lineWidth = 3;
            ctx.strokeStyle = '#00f3ff';
            ctx.shadowBlur = 10;
            ctx.shadowColor = '#00f3ff';
            ctx.beginPath();
            for (let b of state.bullets) {
                ctx.moveTo(b.x, b.y);
                ctx.lineTo(b.x, b.y + b.length);
            }
            ctx.stroke();

            ctx.strokeStyle = '#ff0055';
            ctx.shadowColor = '#ff0055';
            ctx.beginPath();
            for (let ab of state.alienBullets) {
                ctx.moveTo(ab.x, ab.y);
                ctx.lineTo(ab.x, ab.y - ab.length);
            }
            ctx.stroke();
            ctx.restore();

            ctx.save();
            for (let p of state.particles) {
                ctx.fillStyle = p.color;
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fill();
            }
            ctx.restore();

            // HUD
            ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
            ctx.font = '600 15px -apple-system, system-ui, sans-serif';
            ctx.letterSpacing = "1px";
            
            ctx.textAlign = 'left';
            ctx.fillText(`SCORE • ${state.score}`, 30, 40);
            
            ctx.textAlign = 'center';
            ctx.fillText(`WAVE 0${state.wave}`, V_WIDTH / 2, 40);
            
            ctx.textAlign = 'right';
            ctx.fillStyle = '#00f3ff';
            ctx.fillText(`SYSTEM INTEGRITY • ${'▲'.repeat(Math.max(0, state.lives))}`, V_WIDTH - 30, 40);
        }

        function gameOver() {
            state.running = false;
            state.touchId = null;
            document.getElementById('final-score').innerText = `Vectors Terminated: ${state.score} • Waves Survived: ${state.wave}`;
            document.getElementById('gameover-overlay').classList.remove('hidden');
        }

        // --- STABLE DESKTOP CONTROLS ---
        window.addEventListener('keydown', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys['Left'] = true;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys['Right'] = true;
            if (["Space", "ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight"].includes(e.code)) {
                e.preventDefault();
            }
        });
        window.addEventListener('keyup', e => {
            if (e.code === 'ArrowLeft' || e.code === 'KeyA') keys['Left'] = false;
            if (e.code === 'ArrowRight' || e.code === 'KeyD') keys['Right'] = false;
        });

        // --- SINGLE FINGER DRAG ENGINE (ANYWHERE ON SCREEN) ---
        window.addEventListener('touchstart', e => {
            if (!state.running) return;
            const touch = e.touches[0];
            state.touchId = touch.identifier;
            state.touchX = touch.clientX;
        }, { passive: false });

        window.addEventListener('touchmove', e => {
            if (!state.running) return;
            e.preventDefault(); 

            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === state.touchId) {
                    const deltaX = touch.clientX - state.touchX;
                    state.touchX = touch.clientX;
                    
                    // Smooth relative calculation
                    const renderingScale = V_WIDTH / canvas.clientWidth;
                    state.player.x += deltaX * renderingScale * 1.35;
                }
            }
        }, { passive: false });

        window.addEventListener('touchend', e => {
            for (let i = 0; i < e.changedTouches.length; i++) {
                const touch = e.changedTouches[i];
                if (touch.identifier === state.touchId) {
                    state.touchId = null;
                }
            }
        });

        window.addEventListener('touchcancel', e => {
            state.touchId = null;
        });

        // Interface UI Event Mapping hooks
        document.getElementById('start-btn').addEventListener('click', () => {
            AudioFX.init();
            document.getElementById('menu-overlay').classList.add('hidden');
            initGame();
            state.running = true;
            state.lastTime = performance.now();
            requestAnimationFrame(update);
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('gameover-overlay').classList.add('hidden');
            initGame();
            state.running = true;
            state.lastTime = performance.now();
            requestAnimationFrame(update);
        });

        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', () => setTimeout(resizeCanvas, 250));
        
        resizeCanvas();
    </script>
</body>
</html>
